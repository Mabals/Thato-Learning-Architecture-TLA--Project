<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assessment Builder</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151d30;
            --accent-blue: #0070f3;
            --accent-amber: #ffb300;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 40px; display: flex; justify-content: center; }
        .form-container { width: 100%; max-width: 800px; background-color: var(--bg-card); border: 1px solid #223150; padding: 40px; border-radius: 12px; }
        .form-control { width: 100%; background-color: var(--bg-main); border: 1px solid #223150; padding: 12px; border-radius: 6px; color: white; margin-bottom: 20px; font-size: 1rem; }
        .form-control:focus { outline: none; border-color: var(--accent-blue); }
        .submit-btn { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.2s ease; }
        .submit-btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="form-container">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; border-bottom: 1px solid #223150; padding-bottom: 15px;">
            <div>
                <h2 style="color: var(--text-main);">🤖 Smart Free-Tier AI Assessment Generator</h2>
                <p style="color: var(--text-muted); margin-top: 4px; font-size: 0.9rem;">Paste raw question-and-answer transcripts, notes, or texts below to auto-build an assessment structure.</p>
            </div>
            <a href="/dashboard" style="color: var(--accent-blue); text-decoration: none; font-size: 0.9rem; white-space: nowrap;">← Learning Center</a>
        </div>

        <form action="/admin/generator" method="POST">
            <label style="display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 6px;">Target Curriculum Mapped Track Matrix:</label>
            <select name="module_id" class="form-control" required>
                {% for mod in modules %}
                <option value="{{ mod.ID }}">{{ mod.Name }}</option>
                {% endfor %}
            </select>

            <label style="display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 6px;">Assessment Style Profile Choice:</label>
            <select name="assessment_type" class="form-control" required>
                <option value="Quiz">Quiz (Light Checkpoint Evaluation)</option>
                <option value="Test">Test (Intermediate Skill Evaluation)</option>
                <option value="Exam">Exam (Comprehensive Final Certification)</option>
            </select>

            <label style="display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 6px;">Paste Raw Questions & Answers Document Content Blocks:</label>
            <textarea name="raw_text" class="form-control" rows="12" placeholder="Example format:&#10;1. What does SQL stand for?&#10;A) Simple Query Language&#10;B) Structured Query Language&#10;Answer: B&#10;&#10;2. Explain the concept of database normalization in your own words." required></textarea>

            <button type="submit" class="submit-btn">Parse & Extract Content via Gemini AI ⚡</button>
        </form>
    </div>
</body>
</html>
